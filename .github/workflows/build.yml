name: Build VLTV Plus APK

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options: [ debug, release ]

env:
  JAVA_VERSION: '17'

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: gradle

      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 🔧 Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: 📝 Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: 🔑 Decode Keystore (release only)
        if: >
          (github.event.inputs.build_type == 'release' ||
          github.ref == 'refs/heads/main') &&
          secrets.KEYSTORE_BASE64 != ''
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/keystore.jks
        continue-on-error: true

      - name: 📦 Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: 🧹 Clean project
        run: gradle clean

      - name: 🏗️ Build Debug APK
        if: github.event.inputs.build_type != 'release' && github.ref != 'refs/heads/main'
        run: gradle assembleDebug --stacktrace --no-daemon

      - name: 🚀 Build Release APK
        if: github.event.inputs.build_type == 'release' || github.ref == 'refs/heads/main'
        run: gradle assembleRelease --stacktrace --no-daemon
        continue-on-error: true

      - name: 🏗️ Fallback to Debug if Release failed
        if: failure()
        run: gradle assembleDebug --stacktrace --no-daemon

      - name: 📤 Upload Debug APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: VLTV-Plus-Debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
          if-no-files-found: warn

      - name: 📤 Upload Release APK
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: VLTV-Plus-Release-${{ github.run_number }}
          path: app/build/outputs/apk/release/*.apk
          retention-days: 90
          if-no-files-found: warn

      - name: 📊 Build Summary
        if: always()
        run: |
          echo "## 📺 VLTV Plus Build" >> $GITHUB_STEP_SUMMARY
          echo "| Campo | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Build # | ${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
          APK_SIZE=$(find app/build/outputs/apk -name "*.apk" -exec du -sh {} \; 2>/dev/null | head -1 | cut -f1 || echo "N/A")
          echo "| APK Size | $APK_SIZE |" >> $GITHUB_STEP_SUMMARY

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: ⬇️ Download APK
        uses: actions/download-artifact@v4
        with:
          pattern: VLTV-Plus-*
          merge-multiple: true
          path: apks/

      - name: 🏷️ Get version
        id: version
        run: |
          VERSION=$(grep 'versionName' app/build.gradle | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: 🚀 Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}-build${{ github.run_number }}
          name: "VLTV+ v${{ steps.version.outputs.version }} (Build ${{ github.run_number }})"
          body: |
            ## 📺 VLTV Plus — Release automático

            **Versão:** ${{ steps.version.outputs.version }}
            **Build:** ${{ github.run_number }}

            ### 📥 Instalação
            1. Baixe o APK abaixo
            2. No dispositivo: **Configurações → Segurança → Fontes desconhecidas → Ativar**
            3. Instale o APK baixado

            ### 📱 Compatibilidade
            - Android 5.0+ (API 21)
            - Android TV / Fire Stick / Mi Box / TV Box
          files: apks/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
