name: Build VLTV Plus APK

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type (debug or release)'
        required: true
        default: 'debug'
        type: choice
        options: [ debug, release ]

env:
  JAVA_VERSION: '17'
  ANDROID_API: '34'

jobs:
  # ===== BUILD JOB =====
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: gradle

      - name: 🤖 Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: 🔑 Decode Keystore
        # Removido o 'if' para garantir que a chave sempre exista no servidor
        # Assim o Gradle nunca encontrará o storeFile vazio
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/keystore.jks

      - name: 📝 Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: 🔄 Generate Gradle Wrapper
        run: gradle wrapper

      - name: 🔧 Make gradlew executable
        run: chmod +x gradlew

      - name: 📦 Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: 🧹 Clean project
        run: ./gradlew clean

      - name: 🏗️ Build Debug APK
        # Adicionado o envio das senhas para o Debug também
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleDebug --stacktrace

      - name: 🚀 Build Release APK
        if: github.event.inputs.build_type == 'release' || github.ref == 'refs/heads/main'
        env:
          KEYSTORE_PATH: app/keystore.jks
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: ./gradlew assembleRelease --stacktrace

      - name: 📤 Upload Debug APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: VLTV-Plus-Debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
          if-no-files-found: warn

      - name: 📤 Upload Release APK
        if: github.ref == 'refs/heads/main' || github.event.inputs.build_type == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: VLTV-Plus-Release-${{ github.run_number }}
          path: app/build/outputs/apk/release/*.apk
          retention-days: 90
          if-no-files-found: warn

      - name: 📊 Build Summary
        if: always()
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Run # | ${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
